name: Weekly quality gate

on:
  schedule:
    - cron: "0 8 * * 1"   # every Monday 08:00 UTC
  workflow_dispatch:        # allow manual trigger for humans

# This workflow never merges, deploys, or activates schedules.
# It runs tests + smoke and files the report as a workflow summary.
# Any remediation must be done by a human after reviewing the summary.

concurrency:
  group: weekly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  weekly-test:
    name: Weekly pytest (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          RIG_TEST_BYPASS_AUTH: "1"
        run: pytest --tb=short -q

  weekly-smoke:
    name: Weekly smoke gate
    runs-on: ubuntu-latest
    needs: weekly-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run smoke
        run: rig-mesh smoke

      - name: MCP surface import check
        run: |
          python -c "
          from rig_mesh.mcp_server import (
              tool_smoke, tool_list_subsystems, tool_get_status,
              resource_registry, prompt_health_check, HEALTH_CHECK_PROMPT,
          )
          result = tool_smoke()
          assert result['ok'], f'smoke failed: {result}'
          print('MCP surface import OK')
          print('smoke result:', result)
          "

      - name: Write weekly summary
        if: always()
        run: |
          python -c "
          import json, datetime, sys
          from rig_mesh.router import CommandRouter
          router = CommandRouter()
          smoke = router.dispatch('smoke')
          listing = router.dispatch('list')
          report = {
              'generated_at': datetime.datetime.utcnow().isoformat() + 'Z',
              'smoke': smoke,
              'subsystem_count': len(listing.get('subsystems', [])),
              'note': 'Weekly quality gate — no auto-deploy, no auto-merge.',
          }
          print(json.dumps(report, indent=2))
          sys.exit(0 if smoke.get('ok') else 1)
          " | tee /tmp/weekly-report.json
          echo '## Weekly RIG Mesh Quality Gate' >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat /tmp/weekly-report.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '_This workflow never merges, deploys, or creates schedules._' >> $GITHUB_STEP_SUMMARY
